name: Poll Upstream GlassFish Docs

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  poll-upstream-docs:
    name: Check upstream docs changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
      latest_sha: ${{ steps.latest.outputs.sha }}
      previous_sha: ${{ steps.compare.outputs.previous_sha }}
    steps:
      - name: Restore previously seen docs commit
        uses: actions/cache/restore@v4
        with:
          path: .state/upstream-docs-sha
          key: upstream-docs-sha-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            upstream-docs-sha-${{ runner.os }}-

      - name: Get latest upstream docs commit
        id: latest
        uses: actions/github-script@v7
        with:
          script: |
            const response = await github.rest.repos.listCommits({
              owner: 'eclipse-ee4j',
              repo: 'glassfish',
              sha: 'main',
              path: 'docs',
              per_page: 1,
            });
            if (!response.data.length) {
              core.setFailed('No commits found for eclipse-ee4j/glassfish docs path.');
              return;
            }
            core.setOutput('sha', response.data[0].sha);

      - name: Compare with previous docs commit
        id: compare
        run: |
          mkdir -p .state
          previous_sha=""
          if [[ -f .state/upstream-docs-sha ]]; then
            previous_sha="$(cat .state/upstream-docs-sha)"
          fi

          latest_sha="${{ steps.latest.outputs.sha }}"
          echo "previous_sha=$previous_sha" >> "$GITHUB_OUTPUT"

          if [[ "$latest_sha" == "$previous_sha" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream docs change detected ($latest_sha)."
          else
            echo "$latest_sha" > .state/upstream-docs-sha
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Upstream docs changed: $previous_sha -> $latest_sha"
          fi

      - name: Save latest seen docs commit
        if: steps.compare.outputs.changed == 'true'
        uses: actions/cache/save@v4
        with:
          path: .state/upstream-docs-sha
          key: upstream-docs-sha-${{ runner.os }}-${{ github.run_id }}

  build-and-deploy:
    name: Build and deploy if upstream changed
    needs: poll-upstream-docs
    if: needs.poll-upstream-docs.outputs.changed == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/build-and-deploy.yml
